<body>
  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  <div id="screenLog" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow-y:auto;background:rgba(0,0,0,0.85);color:#0f0;font:11px monospace;padding:6px;z-index:99999;display:block;">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span style="color:#ff0;">📋 Console Log</span>
      <button onclick="document.getElementById('screenLog').style.display='none'" style="color:#888;background:none;border:1px solid #555;border-radius:3px;cursor:pointer;font-size:10px;">닫기</button>
    </div>
    <div id="logContent"></div>
  </div>
  <script>
  (function(){
    var logEl = document.getElementById('logContent');
    var msgs = [];
    var maxMsgs = 20;
    function addMsg(type, args) {
      var text = Array.prototype.slice.call(args).map(function(a){
        return typeof a === 'object' ? JSON.stringify(a) : String(a);
      }).join(' ');
      var color = type === 'error' ? '#f44' : type === 'warn' ? '#fa0' : '#0f0';
      msgs.push('<div style="color:'+color+';border-bottom:1px solid #222;padding:2px 0;">'+type.toUpperCase()+': '+text.substring(0,200)+'</div>');
      if (msgs.length > maxMsgs) msgs.shift();
      logEl.innerHTML = msgs.join('');
      logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
    }
    var origLog = console.log, origErr = console.error, origWarn = console.warn;
    console.log = function(){ origLog.apply(console, arguments); addMsg('log', arguments); };
    console.error = function(){ origErr.apply(console, arguments); addMsg('error', arguments); };
    console.warn = function(){ origWarn.apply(console, arguments); addMsg('warn', arguments); };
    window.onerror = function(m,s,l,c,e){ addMsg('error', [m, 'at', s+':'+l+':'+c]); };
  })();
  </script>

  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>

<script src="src/settings.f1ee9.js" charset="utf-8"></script>

<script src="main.99386.js" charset="utf-8"></script>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.8ded5.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
<script>
// Korean text patcher - Label text only
(function() {
  var registered = false;
  function init() {
    if (!window.cc || !cc.director) { setTimeout(init, 1000); return; }
    if (registered) return;
    registered = true;

    function doPatching() {
      setTimeout(function() {
        try {
          var canvas = cc.find('Canvas');
          if (!canvas) return;
          var labels = canvas.getComponentsInChildren(cc.Label);
          var map = {
            '\u63d0\u793a': '\ud78c\ud2b8',
            '\u64a4\u56de': '\ub418\ub3cc\ub9ac\uae30',
            '\u91cd\u8bd5': '\ub2e4\uc2dc\ud558\uae30',
            '\u6682\u505c': '\uc77c\uc2dc\uc815\uc9c0',
            '\u5173\u5361': '\ub808\ubca8',
            '\u514d\u8d39': '\ubb34\ub8cc \ucf54\uc778',
            '\u7ee7\u7eed': '\uacc4\uc18d',
            '\u8fd4\u56de': '\ub3cc\uc544\uac00\uae30',
            '\u4e3b\u9875': '\ud648',
            '\u5206\u4eab': '\uacf5\uc720',
            '\u91cd\u65b0\u5f00\u59cb': '\ub2e4\uc2dc \uc2dc\uc791',
            '\u4e0b\u4e00\u5173': '\ub2e4\uc74c \ub808\ubca8',
            '\u8fc7\u5173': '\ud074\ub9ac\uc5b4',
            '\u5931\u8d25': '\uc2e4\ud328',
            '\u6210\u529f': '\uc131\uacf5',
            '\u51fa\u8f66': '\ucd9c\ucc28',
            '\u505c\u8f66\u5927\u4ea8': '\ud1a0\uc2a4 \uc8fc\ucc28\uac8c\uc784',
            '\u627e\u5230\u4e86': '\ucc3e\uc558\ub2e4',
            '\u6536\u96c6': '\uc218\uc9d1'
          };
          for (var i = 0; i < labels.length; i++) {
            var s = labels[i].string;
            if (typeof s !== 'string') continue;
            for (var cn in map) {
              if (s.indexOf(cn) !== -1) {
                labels[i].string = s.split(cn).join(map[cn]);
              }
            }
          }
          // Hide Chinese sprite hint buttons
          function hideByName(parent, names) {
            if (!parent) return;
            for (var c = 0; c < parent.childrenCount; c++) {
              var child = parent.children[c];
              var nm = child.name;
              for (var k = 0; k < names.length; k++) {
                if (nm === names[k] || nm.toLowerCase().indexOf(names[k].toLowerCase()) !== -1) {
                  child.active = false;
                }
              }
              hideByName(child, names);
            }
          }
          hideByName(canvas, ['m_pHint', 'm_pVideoHint', 'm_pHint_bg', 'm_pVideoHint_bg']);
          console.log('[PARK] Korean labels patched: ' + labels.length);
        } catch(e) { console.log('[PARK] patch error:', e); }
      }, 500);
    }

    cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, doPatching);
    doPatching();
  }
  setTimeout(init, 2000);
})();
</script>
