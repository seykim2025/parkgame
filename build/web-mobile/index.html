  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

    <button onclick="try{cc.director.loadScene('ChooseStageScene');document.getElementById('dbgLog').innerText='→ ChooseStage'}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#2196F3;border:none;border-radius:4px;cursor:pointer;">▶ 스테이지 선택</button>
    <button onclick="try{cc.director.loadScene('game');document.getElementById('dbgLog').innerText='→ game'}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#FF9800;border:none;border-radius:4px;cursor:pointer;">▶ 게임 시작</button>
    <button onclick="try{cc.director.loadScene('main');document.getElementById('dbgLog').innerText='→ main'}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#666;border:none;border-radius:4px;cursor:pointer;">▶ 메인 화면</button>
    <button onclick="try{var s=cc.director.getScene();var info='Scene:'+s.name;var canvas=cc.find('Canvas');if(canvas){var ch=canvas.children;info+='\nChildren:'+ch.length;for(var i=0;i<ch.length;i++){info+='\n '+ch[i].name+' a:'+ch[i].active+' s:'+ch[i].width+'x'+ch[i].height}}document.getElementById('dbgLog').innerText=info}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#9C27B0;border:none;border-radius:4px;cursor:pointer;">🔍 노드</button>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.8ded5.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
<script>
// Comprehensive Korean text patcher
(function() {
  var registered = false;
  function init() {
    if (!window.cc || !cc.director) { setTimeout(init, 1000); return; }
    if (registered) return;
    registered = true;

    function doPatching() {
      setTimeout(function() {
        try {
          var canvas = cc.find('Canvas');
          if (!canvas) return;

          // 1. Patch all Label text
          var labels = canvas.getComponentsInChildren(cc.Label);
          var map = {
            '\u63d0\u793a': '\ud78c\ud2b8',
            '\u64a4\u56de': '\ub418\ub3cc\ub9ac\uae30',
            '\u91cd\u8bd5': '\ub2e4\uc2dc\ud558\uae30',
            '\u6682\u505c': '\uc77c\uc2dc\uc815\uc9c0',
            '\u5173\u5361': '\ub808\ubca8',
            '\u514d\u8d39': '\ubb34\ub8cc \ucf54\uc778',
            '\u7ee7\u7eed': '\uacc4\uc18d',
            '\u8fd4\u56de': '\ub3cc\uc544\uac00\uae30',
            '\u4e3b\u9875': '\ud648',
            '\u5206\u4eab': '\uacf5\uc720',
            '\u91cd\u65b0\u5f00\u59cb': '\ub2e4\uc2dc \uc2dc\uc791',
            '\u4e0b\u4e00\u5173': '\ub2e4\uc74c \ub808\ubca8',
            '\u8fc7\u5173': '\ud074\ub9ac\uc5b4',
            '\u5931\u8d25': '\uc2e4\ud328',
            '\u6210\u529f': '\uc131\uacf5',
            '\u51fa\u8f66': '\ucd9c\ucc28',
            '\u505c\u8f66\u5927\u4ea8': '\ud1a0\uc2a4 \uc8fc\ucc28\uac8c\uc784',
            '\u627e\u5230\u4e86': '\ucc3e\uc558\ub2e4',
            '\u6536\u96c6': '\uc218\uc9d1'
          };
          for (var i = 0; i < labels.length; i++) {
            var s = labels[i].string;
            if (typeof s !== 'string') continue;
            for (var cn in map) {
              if (s.indexOf(cn) !== -1) {
                labels[i].string = s.split(cn).join(map[cn]);
              }
            }
            // Fix title overflow - widen label node if it contains Korean title
            if (s.indexOf('\ud1a0\uc2a4') !== -1 || s.indexOf('\uc8fc\ucc28') !== -1) {
              labels[i].overflow = 0; // NONE - no clipping
              labels[i].node.width = 600;
              labels[i].fontSize = Math.min(labels[i].fontSize, 50);
            }
          }

          // 2. Fix hint buttons - hide sprite, add clean Korean label
          function fixHintButtons(node) {
            var nm = node.name.toLowerCase();
            // Match hint/tishi button nodes
            if ((nm.indexOf('hint') !== -1 || nm.indexOf('tishi') !== -1) && !node._krFixed) {
              node._krFixed = true;
              // Hide all Sprite children (the Chinese text images)
              var sprites = node.getComponentsInChildren(cc.Sprite);
              for (var j = 0; j < sprites.length; j++) {
                sprites[j].node.opacity = 0;
              }
              // Also hide the node's own sprite
              var ownSprite = node.getComponent(cc.Sprite);
              if (ownSprite) node.opacity = 0;

              // Create a visible Korean button
              var btn = new cc.Node('krBtn');
              var label = btn.addComponent(cc.Label);
              if (nm.indexOf('video') !== -1) {
                label.string = '200 \ud78c\ud2b8';
              } else {
                label.string = '\ud78c\ud2b8';
              }
              label.fontSize = 20;
              label.lineHeight = 24;
              btn.color = new cc.Color(0, 200, 200);
              btn.parent = node.parent;
              btn.setPosition(node.x, node.y);
              btn.zIndex = 100;
            }
            // Fix title_bg node - widen it
            if (nm === 'title_bg' || nm === 'titlebg') {
              node.width = Math.max(node.width, 600);
            }
            for (var c = 0; c < node.childrenCount; c++) {
              fixHintButtons(node.children[c]);
            }
          }
          fixHintButtons(canvas);

          console.log('[PARK] Korean patch complete');
        } catch(e) { console.log('[PARK] patch error:', e); }
      }, 500);
    }

    // Run on every scene launch
    cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, doPatching);
    // Also run now for current scene
    doPatching();
    console.log('[PARK] Korean patcher registered');
  }
  setTimeout(init, 2000);
})();
</script>
</body>
