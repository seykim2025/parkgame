    <button onclick="try{cc.director.loadScene('game');document.getElementById('dbgLog').innerText='→ game'}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#FF9800;border:none;border-radius:4px;cursor:pointer;">▶ 게임 시작</button>
    <button onclick="try{cc.director.loadScene('main');document.getElementById('dbgLog').innerText='→ main'}catch(ex){document.getElementById('dbgLog').innerText='ERR:'+ex.message}" style="padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;background:#666;border:none;border-radius:4px;cursor:pointer;">▶ 메인 화면</button>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.8ded5.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
<script>
// Korean text patcher - runs after each scene loads
(function() {
  var applied = false;
  function patchLabels() {
    if (!window.cc || !cc.director) { setTimeout(patchLabels, 1000); return; }
    if (applied) return;
    applied = true;
    cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, function() {
      setTimeout(function() {
        try {
          var canvas = cc.find('Canvas');
          if (!canvas) return;
          // Patch all Label components
          var labels = canvas.getComponentsInChildren(cc.Label);
          var map = {
            '\u63d0\u793a': '\ud78c\ud2b8',     // 提示→힌트
            '\u64a4\u56de': '\ub418\ub3cc\ub9ac\uae30', // 撤回→되돌리기
            '\u91cd\u8bd5': '\ub2e4\uc2dc\ud558\uae30', // 重试→다시하기
            '\u6682\u505c': '\uc77c\uc2dc\uc815\uc9c0', // 暂停→일시정지
            '\u5173\u5361': '\ub808\ubca8',       // 关卡→레벨
            '\u514d\u8d39': '\ubb34\ub8cc \ucf54\uc778', // 免费→무료 코인
            '\u7ee7\u7eed': '\uacc4\uc18d',       // 继续→계속
            '\u8fd4\u56de': '\ub3cc\uc544\uac00\uae30', // 返回→돌아가기
            '\u4e3b\u9875': '\ud648',             // 主页→홈
            '\u5206\u4eab': '\uacf5\uc720',       // 分享→공유
            '\u91cd\u65b0\u5f00\u59cb': '\ub2e4\uc2dc \uc2dc\uc791', // 重新开始→다시 시작
            '\u4e0b\u4e00\u5173': '\ub2e4\uc74c \ub808\ubca8', // 下一关→다음 레벨
            '\u8fc7\u5173': '\ud074\ub9ac\uc5b4', // 过关→클리어
            '\u5931\u8d25': '\uc2e4\ud328',       // 失败→실패
            '\u6210\u529f': '\uc131\uacf5'        // 成功→성공
          };
          for (var i = 0; i < labels.length; i++) {
            var s = labels[i].string;
            if (typeof s !== 'string') continue;
            for (var cn in map) {
              if (s.indexOf(cn) !== -1) {
                labels[i].string = s.split(cn).join(map[cn]);
                break;
              }
            }
          }
          // Overlay Korean text on sprite-based hint buttons
          var hintNames = ['freehint_btn', 'videohint_btn', 'hint_btn', 'tishi'];
          var allNodes = canvas.getComponentsInChildren(cc.Node);
          // Search all child nodes for hint-related buttons
          function searchNode(node) {
            var name = node.name.toLowerCase();
            if (name.indexOf('hint') !== -1 || name.indexOf('tishi') !== -1) {
              if (!node.getComponent(cc.Label) && !node._krPatched) {
                node._krPatched = true;
                var lb = new cc.Node('krOverlay');
                var lc = lb.addComponent(cc.Label);
                lc.string = (name.indexOf('video') !== -1 || name.indexOf('200') !== -1) ? '200 \ud78c\ud2b8' : '\ud78c\ud2b8';
                lc.fontSize = 16; lc.lineHeight = 20;
                lb.color = cc.Color.WHITE;
                lb.parent = node;
                lb.setPosition(0, 0);
              }
            }
            for (var c = 0; c < node.childrenCount; c++) {
              searchNode(node.children[c]);
            }
          }
          searchNode(canvas);
          console.log('[PARK] Korean labels patched: ' + labels.length + ' checked');
        } catch(e) { console.log('[PARK] label patch error:', e); }
      }, 300);
    });
    console.log('[PARK] Korean label patcher registered');
  }
  setTimeout(patchLabels, 2000);
})();
</script>
