<body>
  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

<script type="text/javascript">
(function () {
    // open web debugger console
    if (typeof VConsole !== 'undefined') {
        window.vConsole = new VConsole();
    }

    var debug = window._CCSettings.debug;
    var splash = document.getElementById('splash');
    splash.style.display = 'block';

    function loadScript (moduleName, cb) {
      function scriptLoaded () {
          document.body.removeChild(domScript);
          domScript.removeEventListener('load', scriptLoaded, false);
          cb && cb();
      };
      var domScript = document.createElement('script');
      domScript.async = true;
      domScript.src = moduleName;
      domScript.addEventListener('load', scriptLoaded, false);
      document.body.appendChild(domScript);
    }

    loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.8ded5.js', function () {
      if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {
        loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
      }
      else {
        window.boot();
      }
    });
})();
</script>
<script>
// Korean text patcher - Label text only
(function() {
  var registered = false;
  function init() {
    if (!window.cc || !cc.director) { setTimeout(init, 1000); return; }
    if (registered) return;
    registered = true;

    // Create AudioControlNode (normally in 'main' scene which we skip)
    if (!cc.find('AudioControlNode')) {
      var acn = new cc.Node('AudioControlNode');
      acn.addComponent(cc.AudioSource);
      // Add a dummy AudioSourceControl component
      var AudioSourceControl = cc.Class({
        extends: cc.Component,
        playBg: function(){},
        stopBg: function(){},
        playClick: function(){},
        playMove: function(){},
        playComplete: function(){},
        setMute: function(){},
        isMute: function(){ return false; }
      });
      acn.addComponent(AudioSourceControl);
      cc.game.addPersistRootNode(acn);
      console.log('[PARK] Created AudioControlNode');
    }

    function doPatching() {
      // IMMEDIATE: Replace titlebg sprite right away (no delay)
      try {
        var canvas = cc.find('Canvas');
        if (canvas) {
          (function fixTitle(node) {
            for (var c = 0; c < node.childrenCount; c++) {
              var child = node.children[c];
              if (child.name === 'titlebg' && !child._krFixed) {
                child._krFixed = true;
                child.width = 500;
                child.height = 250;
                var sp = child.getComponent(cc.Sprite);
                if (!sp) sp = child.addComponent(cc.Sprite);
                sp.sizeMode = 0;
                sp.spriteFrame = null;
                cc.loader.load({url: 'logo.png', type: 'png'}, function(err, tex) {
                  if (!err && tex) {
                    sp.spriteFrame = new cc.SpriteFrame(tex);
                  }
                });
              }
              fixTitle(child);
            }
          })(canvas);
        }
      } catch(e) {}

      // DELAYED: Text translation & other patches
      setTimeout(function() {
        try {
          var canvas = cc.find('Canvas');
          if (!canvas) return;
          var labels = canvas.getComponentsInChildren(cc.Label);
          var map = {
            '\u63d0\u793a': '\ud78c\ud2b8',
            '\u64a4\u56de': '\ub418\ub3cc\ub9ac\uae30',
            '\u91cd\u8bd5': '\ub2e4\uc2dc\ud558\uae30',
            '\u6682\u505c': '\uc77c\uc2dc\uc815\uc9c0',
            '\u5173\u5361': '\ub808\ubca8',
            '\u514d\u8d39': '\ubb34\ub8cc \ucf54\uc778',
            '\u7ee7\u7eed': '\uacc4\uc18d',
            '\u8fd4\u56de': '\ub3cc\uc544\uac00\uae30',
            '\u4e3b\u9875': '\ud648',
            '\u5206\u4eab': '\uacf5\uc720',
            '\u91cd\u65b0\u5f00\u59cb': '\ub2e4\uc2dc \uc2dc\uc791',
            '\u4e0b\u4e00\u5173': '\ub2e4\uc74c \ub808\ubca8',
            '\u8fc7\u5173': '\ud074\ub9ac\uc5b4',
            '\u5931\u8d25': '\uc2e4\ud328',
            '\u6210\u529f': '\uc131\uacf5',
            '\u51fa\u8f66': '\ucd9c\ucc28',
            '\u505c\u8f66\u5927\u4ea8': '\uc8fc\ucc28 \uac8c\uc784',
            '\u627e\u5230\u4e86': '\ucc3e\uc558\ub2e4',
            '\u6536\u96c6': '\uc218\uc9d1',
            '\u606d\u559c\u8fc7\u5173': '\uc2a4\ud14c\uc774\uc9c0 \ud074\ub9ac\uc5b4!',
            '\u606d\u559c': '\ucd95\ud558\ud569\ub2c8\ub2e4',
            '\u4e0b\u4e00': '\ub2e4\uc74c'
          };
          for (var i = 0; i < labels.length; i++) {
            var s = labels[i].string;
            if (typeof s !== 'string') continue;
            for (var cn in map) {
              if (s.indexOf(cn) !== -1) {
                labels[i].string = s.split(cn).join(map[cn]);
              }
            }
            var ns = labels[i].string;
            if (labels[i].overflow === 2 || labels[i].overflow === 3) {
              var labelW = labels[i].node.width;
              var estW = ns.length * labels[i].fontSize * 0.7;
              if (estW > labelW) {
                labels[i].overflow = 0;
                labels[i].node.width = Math.max(labelW, estW + 20);
              }
            }
          }
          // Hide hint buttons
          function hideByName(parent, names) {
            if (!parent) return;
            for (var c = 0; c < parent.childrenCount; c++) {
              var child = parent.children[c];
              var nm = child.name;
              for (var k = 0; k < names.length; k++) {
                if (nm === names[k] || nm.toLowerCase().indexOf(names[k].toLowerCase()) !== -1) {
                  child.active = false;
                }
              }
              hideByName(child, names);
            }
          }
          hideByName(canvas, ['m_pHint', 'm_pVideoHint', 'm_pHint_bg', 'm_pVideoHint_bg']);
          // Replace victory image
          function replaceSprite(parent) {
            if (!parent) return;
            for (var c = 0; c < parent.childrenCount; c++) {
              var child = parent.children[c];
              if (child.name === 'psss' && !child._krFixed) {
                child._krFixed = true;
                var sp = child.getComponent(cc.Sprite);
                if (sp) sp.enabled = false;
                var lbl = child.getComponentInChildren(cc.Label);
                if (!lbl) {
                  var tn = new cc.Node('krVictory');
                  lbl = tn.addComponent(cc.Label);
                  tn.parent = child;
                  tn.setPosition(0, 0);
                }
                lbl.string = '\uc2a4\ud14c\uc774\uc9c0 \ud074\ub9ac\uc5b4!';
                lbl.fontSize = 36;
                lbl.lineHeight = 42;
                lbl.node.color = new cc.Color(60, 60, 60);
              }
              if (child.name === 'sub_game_title' || child.name === 'sub_gameTitle') {
                child.width = Math.max(child.width, 700);
              }
              replaceSprite(child);
            }
          }
          replaceSprite(canvas);
          console.log('[PARK] Korean labels patched: ' + labels.length);
        } catch(e) { console.log('[PARK] patch error:', e); }
      }, 500);
    }

    cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, doPatching);
    doPatching();
  }
  setTimeout(init, 2000);
})();
</script>
</body>
